<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استمارة تسجيل متدرب</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="card upload-card">
      <div class="brand">إيثاق</div>
      <h1>استمارة تسجيل متدرب</h1>
      <p class="muted">
        اكتب البيانات المطلوبة وارفع الملفات بشكل واضح، ولن تظهر البيانات إلا للموظفة.
      </p>

      <form id="uploadForm" class="form">
        <div style="font-weight:700; margin-top:8px;">البيانات الشخصية</div>

        <label>
          <span>اسم المتدرب رباعي</span>
          <input type="text" id="customerName" placeholder="مثال: سليمان باجعيفر" required />
        </label>

        <label>
          <span>رقم الهوية أو الإقامة للمتدرب</span>
          <input type="text" id="customerIdNumber" placeholder="اختياري" />
        </label>

        <label>
          <span>رقم الجوال</span>
          <input type="tel" id="phoneNumber" placeholder="05XXXXXXXX" />
        </label>

        <label>
          <span>البريد الإلكتروني</span>
          <input type="email" id="emailAddress" placeholder="example@email.com" />
        </label>

        <label>
          <span>تاريخ الميلاد</span>
          <input type="date" id="birthDate" />
        </label>

        <div style="font-weight:700; margin-top:12px;">البيانات التعليمية</div>

        <label>
          <span>المؤهل الدراسي</span>
          <select id="qualificationLevel" required>
            <option value="">اختر المؤهل</option>
            <option value="ابتدائي">ابتدائي</option>
            <option value="متوسطة">متوسطة</option>
            <option value="ثانوي">ثانوي</option>
            <option value="دبلوم">دبلوم</option>
            <option value="بكالوريوس">بكالوريوس</option>
            <option value="ماجستير">ماجستير</option>
            <option value="دكتوراه">دكتوراه</option>
            <option value="أخرى">أخرى</option>
          </select>
        </label>

        <label>
          <span>التخصص</span>
          <input type="text" id="specialization" placeholder="اختياري" />
        </label>

        <div style="font-weight:700; margin-top:12px;">المرفقات</div>

        <label>
          <span>الهوية الوطنية أو الإقامة</span>
          <input type="file" id="identityFile" accept=".pdf,.jpg,.jpeg,.png" required />
        </label>

        <label>
          <span>آخر مؤهل دراسي</span>
          <input type="file" id="qualificationFile" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" />
        </label>

        <label>
          <span>مرفقات إضافية</span>
          <input type="file" id="extraFiles" multiple />
        </label>

        <label style="display:flex; align-items:flex-start; gap:10px; font-weight:700;">
          <input type="checkbox" id="declaration" style="width:auto; margin-top:4px;" required />
          <span>إقرار بصحة المعلومات وتحمل كامل المسؤولية</span>
        </label>

        <button type="submit" id="submitBtn">رفع الملفات</button>
      </form>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script type="module" src="client.js"></script>
</body>
</html>
