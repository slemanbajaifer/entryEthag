<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رفع ملفات العملاء</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="card upload-card">
      <div class="brand">إيثاق</div>
      <h1>رفع ملفات العميل</h1>
      <p class="muted">اكتب الاسم وارفع الهوية، واختر المؤهل الدراسي، ويمكنك إرفاق شهادة المؤهل ومرفقات إضافية. لن تظهر البيانات إلا للموظفة.</p>

      <form id="uploadForm" class="form">
        <label>
          <span>اسم العميل</span>
          <input type="text" id="customerName" placeholder="مثال: سليمان باجعيفر" required />
        </label>

        <label>
          <span>رقم الهوية أو رقم الطلب</span>
          <input type="text" id="customerIdNumber" placeholder="اختياري" />
        </label>

        <label>
          <span>المؤهل الدراسي</span>
          <select id="qualificationLevel" required>
            <option value="">اختر المؤهل</option>
            <option value="ابتدائي">ابتدائي</option>
            <option value="متوسطة">متوسطة</option>
            <option value="ثانوي">ثانوي</option>
            <option value="دبلوم">دبلوم</option>
            <option value="بكالوريوس">بكالوريوس</option>
            <option value="ماجستير">ماجستير</option>
            <option value="دكتوراه">دكتوراه</option>
            <option value="أخرى">أخرى</option>
          </select>
        </label>

        <label>
          <span>ملف الهوية</span>
          <input type="file" id="identityFile" accept=".pdf,.jpg,.jpeg,.png" required />
        </label>

        <label>
          <span>شهادة المؤهل (اختياري)</span>
          <input type="file" id="qualificationFile" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" />
        </label>

        <label>
          <span>مرفقات إضافية</span>
          <input type="file" id="extraFiles" multiple />
        </label>

        <button type="submit" id="submitBtn">رفع الملفات</button>
      </form>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script type="module" src="client.js"></script>
</body>
</html>
